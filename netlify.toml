[build]
  publish = "build"
  command = "npm run trs-build && npm run obfuscate"
  functions = "netlify/functions"

[build.environment]
  NODE_ENV = "production"
  STEALTH_KEY = "/build/stealth.key"
  TRS_VERSION = "v2.3"

[[redirects]]
  from = "https://trsalliance.co/*"
  to = "https://trsalliance.org/:splat"
  status = 301
  force = true

[[plugins]]  # Correct plugin syntax
  package = "netlify-plugin-ghost-markdown"
  enabled = false

[[plugins]]  # Other plugins
  package = "@netlify/plugin-nextjs"
