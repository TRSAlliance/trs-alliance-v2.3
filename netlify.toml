[build]
  publish = "build"
  command = "npm run trs-build && npm run obfuscate"
  functions = "netlify/functions"

[build.environment]
  NODE_ENV = "production"
  STEALTH_KEY = "/build/stealth.key"
  TRS_VERSION = "v2.3"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# To DISABLE a plugin, simply don't include it
# Or use this empty inputs method:
[[plugins]]
  package = "netlify-plugin-ghost-markdown"
  [plugins.inputs]  # Empty inputs effectively disables it
