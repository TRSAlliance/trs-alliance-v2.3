[build]
  publish = "build"
  command = "npm run trs-build && npm run obfuscate"
  functions = "netlify/functions"

[build.environment]
  NODE_ENV = "production"
  STEALTH_KEY = "/build/stealth.key"
  TRS_VERSION = "v2.3"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Only keep essential plugins you actually use
[[plugins]]
  package = "@netlify/plugin-nextjs"  # Only if you use Next.js
