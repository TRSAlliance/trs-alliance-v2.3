name: TRS-4 Stealth Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      # Checkout code with GPG signing verification
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Run build and obfuscation
      - name: Build and Obfuscate
        run: npm run build && npm run obfuscate
        env:
          STEALTH_KEY: ${{ secrets.STEALTH_KEY }}

      # Deploy to Netlify
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './build'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy TRS-4 Command System'
          netlify-config-path: './netlify.toml'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # Deploy Firebase Functions and Firestore Rules
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@v3
        with:
          args: deploy --only functions,firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      # Update Heartbeat
      - name: Update Heartbeat
        run: |
          curl -X POST "https://us-central1-trsalliance-d8c4c.cloudfunctions.net/heartbeatKeeper" \
            -H "Authorization: Bearer ${{ secrets.FIREBASE_TOKEN }}"
        if: github.event_name == 'push'

      # Pin to IPFS via Web3.Storage
      - name: Pin to IPFS
        run: |
          npm install web3.storage
          node -e "const { Web3Storage } = require('web3.storage'); \
            const storage = new Web3Storage({ token: '${{ secrets.WEB3_STORAGE_KEY }}' }); \
            async function pin() { \
              const files = [new File([JSON.stringify({ timestamp: new Date(), systems: ['trs-signals', 'truth-sealed'] })], 'heartbeat.json')]; \
              const cid = await storage.put(files); \
              console.log('IPFS CID:', cid); \
            } pin();"
        if: github.event_name == 'push'

      # Security Audit
      - name: Run Security Audit
        run: npm audit --production
        continue-on-error: true

      # Notify on Failure (Dead Man’s Switch)
      - name: Notify Contingency
        if: failure()
        run: |
          curl -X POST "https://us-central1-trsalliance-d8c4c.cloudfunctions.net/triggerContingency" \
            -H "Authorization: Bearer ${{ secrets.FIREBASE_TOKEN }}"
